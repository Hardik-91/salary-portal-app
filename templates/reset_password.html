<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Reset Password</h2>

    <form method="POST">
        <input type="hidden" name="email" value="{{ email }}">

        <input type="password" name="password" placeholder="New Password" required>

        <button type="submit">Update Password</button>
    </form>
</div>

</body>
</html>
