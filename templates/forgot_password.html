<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #1e293b, #334155);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 360px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #2563eb;
            text-decoration: none;
        }

        .msg {
            margin-top: 15px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Forgot Password</h2>
    <p>Enter your registered email ID.</p>

    {% if message %}
        <div class="msg">{{ message }}</div>
    {% endif %}

    <form method="POST" action="/forgot-password">
        <input type="email" name="email" placeholder="Enter Email ID" required>
        <button type="submit">Submit</button>
    </form>

    <a href="/">Back to Login</a>
</div>

</body>
</html>
