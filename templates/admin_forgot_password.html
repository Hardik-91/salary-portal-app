<!DOCTYPE html>
<html>
<head>
    <title>Admin Forgot Password</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #1e3a8a, #2563eb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 360px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #2563eb;
            text-decoration: none;
        }

        .msg {
            margin-top: 15px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Admin Forgot Password</h2>
    <p>Enter your registered admin email.</p>

    {% if message %}
        <div class="msg">{{ message }}</div>
    {% endif %}

    <form method="POST" action="/admin-forgot-password">
        <input type="email" name="email" placeholder="Enter Admin Email" required>
        <button type="submit">Submit</button>
    </form>

    <a href="/admin">Back to Admin Login</a>
</div>

</body>
</html>
